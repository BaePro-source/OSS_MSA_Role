server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Auth (public)
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        # Product
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**

        # Chat (REST + WebSocket)
        - id: chat-service
          uri: http://chat-service:8083
          predicates:
            - Path=/api/chat/**
        - id: chat-ws
          uri: ws://chat-service:8083
          predicates:
            - Path=/ws/**

        # Review
        - id: review-service
          uri: http://review-service:8084
          predicates:
            - Path=/api/reviews/**

        # Trade History
        - id: trade-history-service
          uri: http://trade-history-service:8085
          predicates:
            - Path=/api/trades/**

        # Admin
        - id: admin-service
          uri: http://admin-service:8086
          predicates:
            - Path=/api/admin/**

        # AI Services
        - id: ai-recommendation
          uri: http://ai-recommendation:8090
          predicates:
            - Path=/api/ai/recommend/**
        - id: ai-trust
          uri: http://ai-trust:8091
          predicates:
            - Path=/api/ai/trust/**
        - id: ai-review-writer
          uri: http://ai-review-writer:8092
          predicates:
            - Path=/api/ai/review-writer/**
        - id: ai-policy
          uri: http://ai-policy:8093
          predicates:
            - Path=/api/ai/policy/**

jwt:
  secret: ${JWT_SECRET}
